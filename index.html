<!doctype html>
<html lang="en">

<head>
    
	<link rel="stylesheet" href="styles.css">
	<title>Country Top Trumps</title>
	
</head>

<body>
	<h1>Country Top Trumps</h1>

	<h4>Guess which Country comes out on top in a key statistic!</h2>

<div class="gameGrid">

	<div class="countryBlock country1Block" style="grid-area: box-1">
		<p class="country1"></p>
		<div class="flagBox">
			<img class="flag1" style="display:none" alt="CountryFlag">
		</div>
		<p class="chosenStat1"></p>
	</div>

	<div class="statBlock" style="grid-area: box-2">
		<p class="chosenCategory"></p>
	</div>

	<div class="countryBlock country2Block" style="grid-area: box-3">
		<p class="country2"></p>
		<div class="flagBox">
			<img class="flag2" style="display:none" alt="CountryFlag">
		</div>
		<p class="chosenStat2"></p>
	</div>

	<div class="countryButton1Block" style="grid-area: box-4">
	</div>

	<div class="countryButton2Block" style="grid-area: box-5">
	</div>

	<div class="feedbackBlock" style="grid-area: box-6">
		<p class="winLose"></p>
	</div>

	<div class="currentStreakBlock" style="grid-area: box-7">
		<p class="currentStreak"></p>
	</div>

	<div class="buttonBlock" style="grid-area: box-8">
	</div>
	
	<div class="highestStreakBlock" style="grid-area: box-9">				
		<p class="highestStreak"></p>
	</div>
</div>

<script src="script.js" defer></script>

</body>
</html>
