<!doctype html>
<html lang="en">
  <head>
    

    <title>Country Top Trumps</title>

    <style>
      html {
        font-family: sans-serif;
      }

      body {
        width: 50%;
        max-width: 800px;
        min-width: 480px;
        margin: 0 auto;
      }

      .form input[type="number"] {
        width: 200px;
      }

      .lastResult {
        color: white;
        padding: 3px;
      }
    </style>
  </head>

  <body>
    <h1>Country Top Trumps</h1>

    <p>
      Guess which Country comes out on top in a key statistic!
    </p>



    <div class="countryInformation">
	<p class="chosenCategory"></p>

	<p class="country1"></p>
	<img class="flag1" style="display:none" alt="CountryFlag">
	<p class="chosenStat1"></p>
	
	<p class="country2"></p>
	<img class="flag2" style="display:none" alt="CountryFlag">
	<p class="chosenStat2"></p>	

	<p class="winLose"></p>
	<p class="currentStreak"></p>
	<p class="highestStreak"></p>

    </div>

	<div class="gameInformation">
		<p class="currentStreak"></p>
		<p class="successFail"></p>
	</div>
<script src="script.js" defer></script>

  </body>
</html>
